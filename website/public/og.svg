<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7cffcb" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#7cffcb"/>
      <stop offset="0.8" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#1c1c26" stroke-width="0.6" opacity="0.6">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M160 0 V630 M240 0 V630 M320 0 V630 M400 0 V630 M480 0 V630 M560 0 V630 M640 0 V630 M720 0 V630 M800 0 V630 M880 0 V630 M960 0 V630 M1040 0 V630 M1120 0 V630"/>
  </g>

  <!-- orb -->
  <g transform="translate(900 315)">
    <circle r="260" fill="url(#orb)"/>
    <circle r="210" fill="none" stroke="#7cffcb" stroke-opacity="0.35" stroke-dasharray="2 6"/>
    <circle r="140" fill="none" stroke="#8b5cf6" stroke-opacity="0.45"/>
    <circle r="70" fill="#050507" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#ffffff" opacity="0.7" letter-spacing="4">2PC-MPC</text>
  </g>

  <!-- text -->
  <g transform="translate(80 230)">
    <text font-family="JetBrains Mono, monospace" font-size="18" fill="#7cffcb" letter-spacing="3">// IKAVAULT</text>
    <text y="90" font-family="Space Grotesk, sans-serif" font-size="82" font-weight="600" fill="#ffffff">Your passwords.</text>
    <text y="180" font-family="Space Grotesk, sans-serif" font-size="82" font-weight="600" fill="url(#shine)">Split</text>
    <text x="180" y="180" font-family="Space Grotesk, sans-serif" font-size="82" font-weight="600" fill="#ffffff">between you</text>
    <text y="270" font-family="Space Grotesk, sans-serif" font-size="82" font-weight="600" fill="#ffffff">and no one.</text>
    <text y="340" font-family="Inter, sans-serif" font-size="22" fill="#ffffff" opacity="0.55">Decentralized vault on Solana · Ika 2PC-MPC · Walrus · FHE</text>
  </g>
</svg>
